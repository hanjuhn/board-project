name: Frontend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Repository
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. 현재 버전 읽기
      - name: Read current version
        id: version
        run: |
          CURRENT=$(grep "frontend_version" k8s/version.txt | cut -d '=' -f2)
          NEXT=$((CURRENT + 1))
          echo "next_version=$NEXT" >> $GITHUB_OUTPUT

      # 3. version.txt 업데이트
      - name: Update version file
        run: |
          sed -i "s/frontend_version=.*/frontend_version=${{ steps.version.outputs.next_version }}/" k8s/version.txt

      # 4. QEMU 설정
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 5. Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6. DockerHub 로그인
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 7. Docker 이미지 빌드 + push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ steps.version.outputs.next_version }}

      # 8. K8S frontend-deployment.yaml 업데이트
      - name: Update K8S Deployment YAML
        run: |
          sed -i "s|image: .*/frontend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ steps.version.outputs.next_version }}|" k8s/frontend-deployment.yaml

      # 9. 변경 커밋 + Push
      - name: Commit updated YAML
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          git pull --rebase origin main || true

          git add k8s/version.txt
          git add k8s/frontend-deployment.yaml
          git commit -m "Update frontend to version ${{ steps.version.outputs.next_version }}" || exit 0
          git push origin main
