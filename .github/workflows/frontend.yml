name: Frontend CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
name: Frontend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
      - "k8s/frontend-deployment.yaml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 체크아웃
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. 자동 버전 태그 생성
      - name: Get next version tag
        id: next
        run: |
          latest=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$latest" ]; then
            next="v1"
          else
            num=$(echo $latest | sed 's/v//')
            next="v$((num + 1))"
          fi
          echo "next_version=$next" >> $GITHUB_OUTPUT
          echo "Next Version = $next"

      # 3. QEMU 설정
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 4. Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. DockerHub 로그인
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. Docker 이미지 빌드 + 푸시
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ steps.next.outputs.next_version }}

      # 7. k8s YAML 업데이트
      - name: Update K8s Deployment YAML
        run: |
          sed -i "s|image: .*/frontend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ steps.next.outputs.next_version }}|" k8s/frontend-deployment.yaml

      # 8. 변경 커밋 및 push
      - name: Commit updated YAML
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          git pull --rebase origin main || true

          git add k8s/frontend-deployment.yaml
          git commit -m "Update frontend to ${{ steps.next.outputs.next_version }}" || exit 0
          git push origin main
