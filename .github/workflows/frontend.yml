name: Frontend CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Read CURRENT version
        id: version
        run: |
          FILE="k8s/frontend-deployment.yaml"
          CURRENT=$(grep "image: hanjuhn/frontend:" $FILE | sed 's/.*frontend:\(.*\)$/\1/')
          if [ -z "$CURRENT" ]; then CURRENT="v0"; fi
          echo "current_version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Calculate NEXT version
        id: next
        run: |
          CUR="${{ steps.version.outputs.current_version }}"
          NUM=$(echo $CUR | sed 's/v//')
          NEXT=$((NUM+1))
          echo "next_version=v$NEXT" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ steps.next.outputs.next_version }}

      - name: Update K8S Deployment YAML
        run: |
          sed -i "s|image: hanjuhn/frontend:.*|image: hanjuhn/frontend:${{ steps.next.outputs.next_version }}|" k8s/frontend-deployment.yaml

      - name: Commit updated YAML
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add k8s/frontend-deployment.yaml
          git commit -m "Update frontend to ${{ steps.next.outputs.next_version }}"
          git push origin main
