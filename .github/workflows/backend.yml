name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. determine next version
      - name: Read current version
        id: version
        run: |
          CURRENT=$(grep "backend_version" k8s/version.txt | cut -d '=' -f2)
          NEXT=$((CURRENT + 1))
          echo "next_version=$NEXT" >> $GITHUB_OUTPUT

      # 3. update version file
      - name: Update version file
        run: |
          sed -i "s/backend_version=.*/backend_version=${{ steps.version.outputs.next_version }}/" k8s/version.txt

      # 4. set up QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 5. set up Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6. login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 7. build & push backend image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ steps.version.outputs.next_version }}

      # 8. update K8S deployment yaml
      - name: Update K8S Deployment YAML
        run: |
          sed -i "s|image: .*/backend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ steps.version.outputs.next_version }}|" k8s/backend-deployment.yaml

      # 9. commit updated manifests
      - name: Commit updated YAML
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          git pull --rebase origin main || true

          git add k8s/version.txt
          git add k8s/backend-deployment.yaml
          git commit -m "Update backend to version ${{ steps.version.outputs.next_version }}" || exit 0
          git push origin main
