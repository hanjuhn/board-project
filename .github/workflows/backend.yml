name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
      - "k8s/backend-deployment.yaml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. Next version 자동 생성
      - name: Get next version tag
        id: next
        run: |
          latest=$(git tag --sort=-v:refname | grep backend | head -n 1)
          if [ -z "$latest" ]; then
            next="backend-v1"
          else
            num=$(echo $latest | sed 's/backend-v//')
            next="backend-v$((num + 1))"
          fi
          echo "next_version=$next" >> $GITHUB_OUTPUT
          echo "Next Backend Version = $next"

      # 3. QEMU 세팅
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 4. Buildx 세팅
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. DockerHub 로그인
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. Backend 이미지 빌드 + push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ steps.next.outputs.next_version }}

      # 7. K8S Deployment YAML 업데이트
      - name: Update K8S Deployment YAML
        run: |
          sed -i "s|image: .*/backend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ steps.next.outputs.next_version }}|" k8s/backend-deployment.yaml

      # 8. 변경 commit 및 push
      - name: Commit updated YAML
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          git pull --rebase origin main || true

          git add k8s/backend-deployment.yaml
          git commit -m "Update backend to ${{ steps.next.outputs.next_version }}" || exit 0
          git push origin main
